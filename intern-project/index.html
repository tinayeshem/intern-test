<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Finder</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>

  <body>

    <!-- HEADER -->
    <header>
      <div class="header-inner">
        <div class="logo">
          <span class="logo-mark">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
          </span>
          <span class="logo-text">The Library<br>Discover your next favourite book </span>
        </div>
        <div class="header-right">
          
          <!--Theme toggle -->
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
            <span id="themeIcon">☀</span>
            <span id="themeLabel">LIGHT</span>
          </button>
        </div>
      </div>
    </header>

    <!-- SEARCH -->
    <section id="search-section">
      <div class="search-wrap">
        <input id="searchInput" type="text" placeholder="Search books, authors, keywords..." autocomplete="off" />
        <button id="searchBtn">SEARCH</button>
      </div>

      <!--filter -->
      <div class="filter-row" id="filterRow" style="display:none">
        <span class="filter-prefix">// filter by author:</span>
        <input id="authorFilter" type="text" class="filter-input" placeholder="e.g. Tolkien" />
        <button id="filterClear" class="filter-clear">✕ CLEAR</button>
      </div>

      <p id="message"></p>
    </section>

    <!-- MAIN -->
    <main class="main-layout">

      <!--Results -->
      <section class="results-section">
        <div class="section-label" id="resultsLabel" style="display:none">
          <span id="resultsCount"></span>
          <span id="resultsQuery"></span>
        </div>
        <div id="booksContainer">
          <div class="state-empty">
            <span class="state-num">404</span>
            <p>Nothing here yet.<br>Try searching for a book above.</p>
          </div>
        </div>
      </section>

      <!--Favourites -->
      <aside class="fav-panel">
        <div class="fav-panel-header">
          <span class="fav-panel-title">SAVED</span>
          <span class="fav-badge" id="favBadge">0</span>
        </div>
        <div id="favorites">
          <p class="fav-empty">Favourites</p>
        </div>
      </aside>

    </main>

    <footer>
      <span>Powered by Open Library</span>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
